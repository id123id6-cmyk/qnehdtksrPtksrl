name: Update bunyang data

on:
  schedule:
    # UTC 00:00 = KST 09:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Applyhome APT listings
        env:
          BUNYANG_API_KEY: ${{ secrets.BUNYANG_API_KEY }}
        run: node scripts/fetch-bunyang-data.mjs

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/bunyang-alarm/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(bunyang): 청약 분양정보 data.json 갱신"
            git push
          fi
